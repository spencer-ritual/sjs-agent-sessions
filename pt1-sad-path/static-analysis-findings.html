<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritual Chain Static Analysis — Findings Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-0:#0a0a12;--bg-1:#12121f;--bg-2:#1a1a2e;--bg-3:#24243a;
  --text-0:#e8e6f0;--text-1:#b0adc0;--text-2:#7a7890;
  --accent:#7c5cfc;--accent2:#a78bfa;
  --crit:#ff3366;--high:#ff6b35;--med-high:#ff9f1c;--med:#f5c542;
  --low-med:#8ac926;--low:#36d399;--info:#38bdf8;--good:#22d3ee;
  --bydesign:#a78bfa;--na:#64748b;
  --border:#2a2a44;--radius:8px;
}
body{background:var(--bg-0);color:var(--text-0);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.5;min-height:100vh}
code,pre,.mono{font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace}
a{color:var(--accent2);text-decoration:none}a:hover{text-decoration:underline}

/* Header */
.header{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);border-bottom:1px solid var(--border);padding:24px 32px}
.header h1{font-size:1.6rem;font-weight:700;letter-spacing:-0.5px}
.header .subtitle{color:var(--text-2);font-size:0.85rem;margin-top:4px}
.badge-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.sev-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:0.75rem;font-weight:600}
.sev-CRITICAL{background:rgba(255,51,102,0.2);color:var(--crit);border:1px solid rgba(255,51,102,0.3)}
.sev-HIGH{background:rgba(255,107,53,0.2);color:var(--high);border:1px solid rgba(255,107,53,0.3)}
.sev-MEDIUM-HIGH{background:rgba(255,159,28,0.2);color:var(--med-high);border:1px solid rgba(255,159,28,0.3)}
.sev-MEDIUM{background:rgba(245,197,66,0.2);color:var(--med);border:1px solid rgba(245,197,66,0.3)}
.sev-LOW-MEDIUM{background:rgba(138,201,38,0.2);color:var(--low-med);border:1px solid rgba(138,201,38,0.3)}
.sev-LOW{background:rgba(54,211,153,0.2);color:var(--low);border:1px solid rgba(54,211,153,0.3)}
.sev-INFO{background:rgba(56,189,248,0.2);color:var(--info);border:1px solid rgba(56,189,248,0.3)}
.sev-GOOD{background:rgba(34,211,238,0.2);color:var(--good);border:1px solid rgba(34,211,238,0.3)}
.sev-BY-DESIGN{background:rgba(167,139,250,0.2);color:var(--bydesign);border:1px solid rgba(167,139,250,0.3)}
.sev-NA{background:rgba(100,116,139,0.2);color:var(--na);border:1px solid rgba(100,116,139,0.3)}

/* Tabs */
.tabs{display:flex;gap:0;background:var(--bg-1);border-bottom:1px solid var(--border);padding:0 32px}
.tab{padding:12px 20px;cursor:pointer;color:var(--text-2);font-size:0.85rem;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text-0)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}

/* Controls */
.controls{background:var(--bg-1);padding:16px 32px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.search-box{background:var(--bg-2);border:1px solid var(--border);color:var(--text-0);padding:8px 14px;border-radius:var(--radius);font-size:0.85rem;width:260px;outline:none}
.search-box:focus{border-color:var(--accent)}
.filter-group{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.filter-group label{color:var(--text-2);font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-right:4px}
.filter-btn{background:var(--bg-2);border:1px solid var(--border);color:var(--text-1);padding:4px 10px;border-radius:6px;font-size:0.75rem;cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:var(--radius);font-size:0.8rem;cursor:pointer;font-weight:500;transition:background .2s}
.btn:hover{background:#6a4ae0}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-1)}
.btn-outline:hover{border-color:var(--accent);color:var(--text-0)}

/* Cards */
.main{padding:24px 32px}
.card-list{display:flex;flex-direction:column;gap:8px}
.finding-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.finding-card:hover{border-color:var(--accent)}
.finding-card.dismissed{opacity:0.5}
.card-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
.card-header .fid{font-family:monospace;font-weight:700;font-size:0.85rem;min-width:90px}
.card-header .fsummary{flex:1;font-size:0.85rem;color:var(--text-0)}
.card-header .fmeta{display:flex;gap:8px;align-items:center;font-size:0.75rem;color:var(--text-2)}
.card-header .agent-tag{background:var(--bg-3);padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:600}
.card-header .conf{font-size:0.7rem}
.card-header .repo-tag{font-family:monospace;font-size:0.7rem;color:var(--text-2)}
.card-header .expand-icon{color:var(--text-2);transition:transform .2s;font-size:1rem}
.finding-card.open .expand-icon{transform:rotate(90deg)}

.card-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.finding-card.open .card-detail{display:block}
.card-detail .detail-grid{display:grid;grid-template-columns:120px 1fr;gap:4px 12px;font-size:0.8rem;margin-top:12px}
.card-detail .detail-grid dt{color:var(--text-2);font-weight:600}
.card-detail .detail-grid dd{color:var(--text-0)}
.card-detail .detail-text{margin-top:12px;font-size:0.82rem;color:var(--text-1);white-space:pre-wrap;line-height:1.6;max-height:400px;overflow-y:auto;padding:12px;background:var(--bg-2);border-radius:6px}
.dismiss-row{margin-top:12px;display:flex;align-items:center;gap:12px}
.dismiss-row label{font-size:0.8rem;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:6px}
.dismiss-row input[type=checkbox]{accent-color:var(--accent)}
.dismiss-note{background:var(--bg-2);border:1px solid var(--border);color:var(--text-0);padding:6px 10px;border-radius:6px;font-size:0.8rem;flex:1;outline:none}
.dismiss-note:focus{border-color:var(--accent)}

/* Themes */
.themes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.theme-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.theme-card h3{font-size:0.95rem;margin-bottom:6px}
.theme-card p{font-size:0.8rem;color:var(--text-1);margin-bottom:10px}
.theme-card .theme-findings{display:flex;flex-wrap:wrap;gap:4px}
.theme-card .theme-fid{font-family:monospace;font-size:0.7rem;background:var(--bg-3);padding:2px 6px;border-radius:4px;cursor:pointer;color:var(--accent2)}
.theme-card .theme-fid:hover{background:var(--accent);color:#fff}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:16px}
.stat-box{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.stat-box h3{font-size:0.9rem;margin-bottom:16px;color:var(--text-1)}
.bar-chart{display:flex;flex-direction:column;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:0.75rem;color:var(--text-2);min-width:140px;text-align:right;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:20px;background:var(--bg-2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-count{font-size:0.7rem;color:var(--text-2);min-width:28px;text-align:right}

/* Sort */
.sort-row{display:flex;gap:6px;align-items:center;margin-bottom:12px}
.sort-row label{font-size:0.75rem;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

/* Count */
.results-count{font-size:0.8rem;color:var(--text-2);margin-bottom:12px}

/* Responsive */
@media(max-width:768px){
  .header,.controls,.main,.tabs{padding-left:16px;padding-right:16px}
  .search-box{width:100%}
  .card-header{flex-wrap:wrap}
  .card-header .fmeta{width:100%;margin-top:4px}
  .stats-grid,.themes-grid{grid-template-columns:1fr}
}
</style>
</head>

<div id="tab-stats" class="tab-content">

</div>

const THEMES = [{"id":"T1","name":"Environment Variables as Consensus Parameters","desc":"Multiple env vars create hidden consensus parameters that cause chain splits if inconsistent across nodes.","findings":["A1-007","A4-F4","A5-09","D3-1.5","E2-13","A6-L3"]},{"id":"T3","name":"Non-Determinism in Native Precompiles","desc":"Three independent sources of non-determinism in consensus-critical precompiles: ONNX FP, JQ timeouts, gas estimation FP math.","findings":["A6-C1","A6-H5","A6-H6","A2-004","D2-M3"]},{"id":"T4","name":"Executor Reliability","desc":"Multiple paths where completed work is permanently lost: errors swallowed, fire-and-forget submission, queue drops.","findings":["B2-1","B2-7","B2-9","B3-HIGH-04","B1-04"]},{"id":"T5","name":"RLP Encoding Fragility","desc":"Custom transaction types have structural encoding issues: optional field asymmetry, missing list headers, hash path divergence.","findings":["D1-01","D1-02","D1-03","D1-04","D1-05","D1-06","D1-07"]},{"id":"T6","name":"Reorg Safety Gap","desc":"All in-memory state stores used by the block builder are forward-only with no revert handling.","findings":["A3-001","A3-002","A3-003","A3-004","A3-005","A3-008"]},{"id":"T7","name":"Test Coverage Gaps","desc":"Critical contracts and flows have zero test coverage, including AsyncDelivery, RitualWallet, staking stack, and scheduler predicates.","findings":["E3-C1","E3-C3","E3-C4","E3-C5","E3-C6","E3-C8","E3-C9"]}];

const SEV_ORDER = ['CRITICAL','HIGH','MEDIUM-HIGH','MEDIUM','LOW-MEDIUM','LOW','INFO','GOOD','BY DESIGN','N/A'];
const SEV_COLORS = {
  'CRITICAL':'#ff3366','HIGH':'#ff6b35','MEDIUM-HIGH':'#ff9f1c','MEDIUM':'#f5c542',
  'LOW-MEDIUM':'#8ac926','LOW':'#36d399','INFO':'#38bdf8','GOOD':'#22d3ee',
  'BY DESIGN':'#a78bfa','N/A':'#64748b'
};

// ===== STATE =====
let state = loadState();
function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem('ritual_findings_state') || '{}');
    return {
      dismissed: s.dismissed || {},
      notes: s.notes || {},
      filters: s.filters || {sevs:[],agents:[],repos:[],themes:[]},
      search: s.search || '',
      sort: s.sort || 'severity',
      showDismissed: s.showDismissed !== undefined ? s.showDismissed : true
    };
  } catch(e){ return {dismissed:{},notes:{},filters:{sevs:[],agents:[],repos:[],themes:[]},search:'',sort:'severity',showDismissed:true}; }
}
function saveState(){
  try{ localStorage.setItem('ritual_findings_state', JSON.stringify(state)); } catch(e){}
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  buildHeaderBadges();
  buildFilters();
  buildThemes();
  buildStats();
  renderFindings();
  restoreUI();

  // Tabs
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
  }));

  // Search
  const sb = document.getElementById('searchBox');
  sb.value = state.search;
  let debounce;
  sb.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { state.search = sb.value; saveState(); renderFindings(); }, 200);
  });

  // Show dismissed
  const sd = document.getElementById('showDismissed');
  sd.checked = state.showDismissed;
  sd.addEventListener('change', () => { state.showDismissed = sd.checked; saveState(); renderFindings(); });
});

function restoreUI(){
  // Restore filter button states
  document.querySelectorAll('#sevFilters .filter-btn').forEach(b => {
    if(state.filters.sevs.includes(b.dataset.val)) b.classList.add('active');
  });
  document.querySelectorAll('#agentFilters .filter-btn').forEach(b => {
    if(state.filters.agents.includes(b.dataset.val)) b.classList.add('active');
  });
  document.querySelectorAll('#repoFilters .filter-btn').forEach(b => {
    if(state.filters.repos.includes(b.dataset.val)) b.classList.add('active');
  });
  document.querySelectorAll('#themeFilters .filter-btn').forEach(b => {
    if(state.filters.themes.includes(b.dataset.val)) b.classList.add('active');
  });
  // Sort buttons
  document.querySelectorAll('.sort-row .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sort === state.sort);
  });
}

// ===== HEADER BADGES =====
function buildHeaderBadges(){
  const counts = {};
  SEV_ORDER.forEach(s => counts[s] = 0);
  FINDINGS.forEach(f => { counts[f.sev] = (counts[f.sev]||0) + 1; });
  const dismissedCount = Object.keys(state.dismissed).filter(k => state.dismissed[k]).length;
  const el = document.getElementById('headerBadges');
  let h = '';
  SEV_ORDER.forEach(s => {
    if(counts[s] > 0){
      const cls = s.replace(/\s+/g,'-');
      h += '<span class="sev-badge sev-' + cls + '">' + s + ' ' + counts[s] + '</span>';
    }
  });
  h += '<span style="color:var(--text-2);font-size:0.75rem;margin-left:8px">' + FINDINGS.length + ' total &middot; ' + dismissedCount + ' dismissed &middot; ' + (FINDINGS.length - dismissedCount) + ' active</span>';
  el.innerHTML = h;
}

// ===== FILTERS =====
function buildFilters(){
  const sevs = [...new Set(FINDINGS.map(f=>f.sev))].sort((a,b)=>SEV_ORDER.indexOf(a)-SEV_ORDER.indexOf(b));
  const agents = [...new Set(FINDINGS.map(f=>f.agent))].sort();
  const repos = [...new Set(FINDINGS.map(f=>f.repo))].sort();
  const themeNames = THEMES.map(t=>t.name);

  fillFilterGroup('sevFilters', sevs, 'sevs');
  fillFilterGroup('agentFilters', agents, 'agents');
  fillFilterGroup('repoFilters', repos, 'repos');
  fillFilterGroup('themeFilters', themeNames, 'themes');
}

function fillFilterGroup(elId, values, filterKey){
  const el = document.getElementById(elId);
  values.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.val = v;
    btn.textContent = v;
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if(btn.classList.contains('active')){
        if(!state.filters[filterKey].includes(v)) state.filters[filterKey].push(v);
      } else {
        state.filters[filterKey] = state.filters[filterKey].filter(x=>x!==v);
      }
      saveState();
      renderFindings();
    });
    el.appendChild(btn);
  });
}

// ===== SORTING =====
function setSort(s){
  state.sort = s;
  document.querySelectorAll('.sort-row .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === s));
  saveState();
  renderFindings();
}

function sortFindings(arr){
  const s = state.sort;
  return [...arr].sort((a,b) => {
    if(s==='severity') return SEV_ORDER.indexOf(a.sev) - SEV_ORDER.indexOf(b.sev);
    if(s==='agent') return a.agent.localeCompare(b.agent) || SEV_ORDER.indexOf(a.sev) - SEV_ORDER.indexOf(b.sev);
    if(s==='confidence') return (b.conf||0) - (a.conf||0);
    if(s==='file') return (a.file||'').localeCompare(b.file||'');
    if(s==='id') return a.id.localeCompare(b.id);
    return 0;
  });
}

// ===== FILTERING =====
function getThemeFindingIds(themeName){
  const t = THEMES.find(x=>x.name===themeName);
  return t ? t.findings : [];
}

function filterFindings(){
  let arr = FINDINGS;
  const f = state.filters;
  if(f.sevs.length) arr = arr.filter(x => f.sevs.includes(x.sev));
  if(f.agents.length) arr = arr.filter(x => f.agents.includes(x.agent));
  if(f.repos.length) arr = arr.filter(x => f.repos.includes(x.repo));
  if(f.themes.length){
    const ids = new Set();
    f.themes.forEach(tn => getThemeFindingIds(tn).forEach(id => ids.add(id)));
    arr = arr.filter(x => ids.has(x.id));
  }
  if(!state.showDismissed) arr = arr.filter(x => !state.dismissed[x.id]);
  if(state.search){
    const q = state.search.toLowerCase();
    arr = arr.filter(x =>
      x.id.toLowerCase().includes(q) ||
      x.summary.toLowerCase().includes(q) ||
      (x.file||'').toLowerCase().includes(q) ||
      (x.details||'').toLowerCase().includes(q) ||
      x.repo.toLowerCase().includes(q) ||
      x.agent.toLowerCase().includes(q)
    );
  }
  return arr;
}

// ===== RENDER =====
function renderFindings(){
  const filtered = filterFindings();
  const sorted = sortFindings(filtered);
  const el = document.getElementById('cardList');
  document.getElementById('resultsCount').textContent = sorted.length + ' of ' + FINDINGS.length + ' findings shown';
  buildHeaderBadges();

  if(sorted.length === 0){
    el.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text-2)">No findings match your filters.</div>';
    return;
  }

  let h = '';
  sorted.forEach(f => {
    const sevCls = f.sev.replace(/\s+/g,'-');
    const isDismissed = state.dismissed[f.id];
    const note = state.notes[f.id] || '';
    h += '<div class="finding-card' + (isDismissed ? ' dismissed' : '') + '" id="card-' + f.id + '">';
    h += '<div class="card-header" onclick="toggleCard(\'' + f.id + '\')">';
    h += '<span class="fid">' + esc(f.id) + '</span>';
    h += '<span class="sev-badge sev-' + sevCls + '">' + esc(f.sev) + '</span>';
    h += '<span class="fsummary">' + esc(f.summary) + '</span>';
    h += '<span class="fmeta">';
    h += '<span class="agent-tag">' + esc(f.agent) + '</span>';
    h += '<span class="repo-tag">' + esc(f.repo) + '</span>';
    if(f.conf) h += '<span class="conf">' + Math.round(f.conf*100) + '%</span>';
    h += '</span>';
    h += '<span class="expand-icon">&#9654;</span>';
    h += '</div>';
    h += '<div class="card-detail">';
    h += '<dl class="detail-grid">';
    h += '<dt>File</dt><dd class="mono">' + esc(f.file || 'N/A') + '</dd>';
    h += '<dt>Repository</dt><dd>' + esc(f.repo) + '</dd>';
    h += '<dt>Agent</dt><dd>' + esc(f.agent) + '</dd>';
    h += '<dt>Confidence</dt><dd>' + (f.conf ? Math.round(f.conf*100) + '%' : 'N/A') + '</dd>';
    // themes this finding belongs to
    const fthemes = THEMES.filter(t => t.findings.includes(f.id)).map(t => t.name);
    if(fthemes.length) h += '<dt>Themes</dt><dd>' + fthemes.map(esc).join(', ') + '</dd>';
    h += '</dl>';
    if(f.details) h += '<div class="detail-text">' + esc(f.details) + '</div>';
    h += '<div class="dismiss-row">';
    h += '<label><input type="checkbox" ' + (isDismissed ? 'checked' : '') + ' onchange="toggleDismiss(\'' + f.id + '\', this.checked)"> Dismissed</label>';
    h += '<input type="text" class="dismiss-note" placeholder="Dismissal note..." value="' + escAttr(note) + '" onchange="setNote(\'' + f.id + '\', this.value)">';
    h += '</div></div></div>';
  });
  el.innerHTML = h;
}

function toggleCard(id){
  const el = document.getElementById('card-' + id);
  if(el) el.classList.toggle('open');
}

function toggleDismiss(id, checked){
  state.dismissed[id] = checked;
  saveState();
  const el = document.getElementById('card-' + id);
  if(el) el.classList.toggle('dismissed', checked);
  buildHeaderBadges();
  if(!state.showDismissed && checked) renderFindings();
}

function setNote(id, val){
  state.notes[id] = val;
  saveState();
}

function esc(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== THEMES =====
function buildThemes(){
  const el = document.getElementById('themesGrid');
  let h = '';
  THEMES.forEach(t => {
    h += '<div class="theme-card">';
    h += '<h3>' + esc(t.name) + '</h3>';
    h += '<p>' + esc(t.desc) + '</p>';
    h += '<div class="theme-findings">';
    t.findings.forEach(fid => {
      h += '<span class="theme-fid" onclick="jumpToFinding(\'' + fid + '\')">' + fid + '</span>';
    });
    h += '</div></div>';
  });
  el.innerHTML = h;
}

function jumpToFinding(id){
  // Switch to findings tab
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
  document.querySelector('[data-tab="findings"]').classList.add('active');
  document.getElementById('tab-findings').classList.add('active');
  // Clear filters, search for ID
  state.search = id;
  state.filters = {sevs:[],agents:[],repos:[],themes:[]};
  document.getElementById('searchBox').value = id;
  document.querySelectorAll('.filter-btn').forEach(b => {
    if(b.dataset.val) b.classList.remove('active');
  });
  saveState();
  renderFindings();
  setTimeout(() => {
    const card = document.getElementById('card-' + id);
    if(card){ card.classList.add('open'); card.scrollIntoView({behavior:'smooth',block:'center'}); }
  }, 100);
}

// ===== STATS =====
function buildStats(){
  const el = document.getElementById('statsGrid');
  let h = '';

  // Severity distribution
  const sevCounts = {};
  SEV_ORDER.forEach(s => sevCounts[s] = 0);
  FINDINGS.forEach(f => sevCounts[f.sev] = (sevCounts[f.sev]||0)+1);
  const maxSev = Math.max(...Object.values(sevCounts));
  h += '<div class="stat-box"><h3>Findings by Severity</h3><div class="bar-chart">';
  SEV_ORDER.forEach(s => {
    if(sevCounts[s] > 0){
      const pct = (sevCounts[s]/maxSev*100).toFixed(1);
      h += '<div class="bar-row"><span class="bar-label">' + s + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (SEV_COLORS[s]||'#666') + '"></div></div><span class="bar-count">' + sevCounts[s] + '</span></div>';
    }
  });
  h += '</div></div>';

  // Repo distribution
  const repoCounts = {};
  FINDINGS.forEach(f => repoCounts[f.repo] = (repoCounts[f.repo]||0)+1);
  const repoSorted = Object.entries(repoCounts).sort((a,b)=>b[1]-a[1]);
  const maxRepo = repoSorted[0] ? repoSorted[0][1] : 1;
  h += '<div class="stat-box"><h3>Findings by Repository</h3><div class="bar-chart">';
  repoSorted.forEach(([repo,cnt]) => {
    const pct = (cnt/maxRepo*100).toFixed(1);
    h += '<div class="bar-row"><span class="bar-label">' + repo + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--accent)"></div></div><span class="bar-count">' + cnt + '</span></div>';
  });
  h += '</div></div>';

  // Agent distribution
  const agentCounts = {};
  FINDINGS.forEach(f => agentCounts[f.agent] = (agentCounts[f.agent]||0)+1);
  const agentSorted = Object.entries(agentCounts).sort((a,b)=>b[1]-a[1]);
  const maxAgent = agentSorted[0] ? agentSorted[0][1] : 1;
  h += '<div class="stat-box"><h3>Findings by Agent</h3><div class="bar-chart">';
  agentSorted.forEach(([agent,cnt]) => {
    const pct = (cnt/maxAgent*100).toFixed(1);
    h += '<div class="bar-row"><span class="bar-label">' + agent + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--accent2)"></div></div><span class="bar-count">' + cnt + '</span></div>';
  });
  h += '</div></div>';

  // Active vs Dismissed
  const dismissedCount = Object.keys(state.dismissed).filter(k => state.dismissed[k]).length;
  const activeCount = FINDINGS.length - dismissedCount;
  h += '<div class="stat-box"><h3>Active vs Dismissed</h3>';
  h += '<div style="display:flex;gap:24px;align-items:center;margin-top:8px">';
  h += '<div style="text-align:center"><div style="font-size:2.5rem;font-weight:700;color:var(--accent)">' + activeCount + '</div><div style="font-size:0.8rem;color:var(--text-2)">Active</div></div>';
  h += '<div style="text-align:center"><div style="font-size:2.5rem;font-weight:700;color:var(--text-2)">' + dismissedCount + '</div><div style="font-size:0.8rem;color:var(--text-2)">Dismissed</div></div>';
  h += '</div>';
  // severity breakdown for active
  h += '<div style="margin-top:16px"><div style="font-size:0.8rem;color:var(--text-2);margin-bottom:8px">Active by severity:</div><div style="display:flex;gap:6px;flex-wrap:wrap">';
  SEV_ORDER.forEach(s => {
    const active = FINDINGS.filter(f => f.sev === s && !state.dismissed[f.id]).length;
    if(active > 0){
      const cls = s.replace(/\s+/g,'-');
      h += '<span class="sev-badge sev-' + cls + '">' + s + ' ' + active + '</span>';
    }
  });
  h += '</div></div></div>';

  // Confidence distribution
  const confBuckets = {'90-100%':0,'80-89%':0,'70-79%':0,'60-69%':0,'Below 60%':0,'N/A':0};
  FINDINGS.forEach(f => {
    if(!f.conf) confBuckets['N/A']++;
    else if(f.conf >= 0.9) confBuckets['90-100%']++;
    else if(f.conf >= 0.8) confBuckets['80-89%']++;
    else if(f.conf >= 0.7) confBuckets['70-79%']++;
    else if(f.conf >= 0.6) confBuckets['60-69%']++;
    else confBuckets['Below 60%']++;
  });
  const maxConf = Math.max(...Object.values(confBuckets));
  h += '<div class="stat-box"><h3>Confidence Distribution</h3><div class="bar-chart">';
  Object.entries(confBuckets).forEach(([label,cnt]) => {
    if(cnt > 0){
      const pct = (cnt/maxConf*100).toFixed(1);
      h += '<div class="bar-row"><span class="bar-label">' + label + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--low)"></div></div><span class="bar-count">' + cnt + '</span></div>';
    }
  });
  h += '</div></div>';

  // Theme coverage
  h += '<div class="stat-box"><h3>Theme Coverage</h3><div class="bar-chart">';
  const maxTheme = Math.max(...THEMES.map(t=>t.findings.length));
  THEMES.forEach(t => {
    const pct = (t.findings.length/maxTheme*100).toFixed(1);
    h += '<div class="bar-row"><span class="bar-label" title="' + esc(t.name) + '">' + esc(t.name.substring(0,25)) + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--bydesign)"></div></div><span class="bar-count">' + t.findings.length + '</span></div>';
  });
  h += '</div></div>';

  el.innerHTML = h;
}

// ===== EXPORT / RESET =====
function exportJSON(){
  const exported = {
    exportDate: new Date().toISOString(),
    totalFindings: FINDINGS.length,
    dismissed: state.dismissed,
    notes: state.notes,
    findings: FINDINGS.map(f => ({
      ...f,
      dismissed: !!state.dismissed[f.id],
      dismissalNote: state.notes[f.id] || ''
    }))
  };
  const blob = new Blob([JSON.stringify(exported, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ritual-findings-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function resetAll(){
  if(!confirm('Reset all dismissed findings, notes, and filter state?')) return;
  localStorage.removeItem('ritual_findings_state');
  location.reload();
}
